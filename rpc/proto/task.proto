syntax = "proto3";

package rpc;

option go_package = "github.com/lynnyq/hdp-disk-inspect/rpc/proto";

service Task {
    rpc Run(TaskRequest) returns (TaskResponse) {}
}

message TaskRequest {
    string command = 2; // 命令
    int32 timeout = 3;  // 任务执行超时时间(秒)
    int64 id = 4; // 执行任务唯一ID
}

message TaskResponse {
    optional string output = 1;      // 标准输出(stdout)
    optional string stderr = 5;      // 标准错误输出(stderr)
    optional string error = 2;       // 执行错误信息
    optional int32 exit_code = 3;    // 退出码
    optional int64 start_time = 6;   // 开始执行时间戳(毫秒)
    optional int64 end_time = 7;     // 结束执行时间戳(毫秒)
    optional int64 duration_ms = 4;  // 执行耗时(毫秒)
}